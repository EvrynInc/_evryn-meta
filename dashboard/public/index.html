<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Evryn Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 16px;
      line-height: 1.5;
    }
    h1 { color: #fff; margin-bottom: 4px; font-size: 1.4rem; }
    h2 { color: #888; margin: 16px 0 8px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

    /* Agent Grid */
    .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-bottom: 16px; }
    .agent-card {
      background: #1a1a1a;
      border-radius: 6px;
      padding: 10px 12px;
      border: 1px solid #333;
      position: relative;
    }
    .agent-card.green { border-color: #22c55e; }
    .agent-card.yellow { border-color: #eab308; }
    .agent-card.red { border-color: #ef4444; }
    .agent-card.halted { opacity: 0.6; }
    .agent-name { font-size: 0.8rem; color: #fff; font-weight: 500; }
    .agent-spend { font-size: 1rem; font-weight: 600; margin-top: 2px; }
    .agent-spend.green { color: #22c55e; }
    .agent-spend.yellow { color: #eab308; }
    .agent-spend.red { color: #ef4444; }
    .agent-budget { font-size: 0.7rem; color: #666; }
    .status-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }
    .status-dot.active { background: #22c55e; }
    .status-dot.halted { background: #ef4444; }
    .status-dot.idle { background: #666; }

    /* Legends */
    .legend { display: flex; gap: 16px; font-size: 0.7rem; color: #666; margin-bottom: 12px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .legend-bar { width: 12px; height: 3px; border-radius: 1px; }

    /* Filters */
    .filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .filters-label { font-size: 0.75rem; color: #666; margin-right: 4px; }
    .filter-btn {
      padding: 4px 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      cursor: pointer;
      color: #888;
      font-size: 0.75rem;
    }
    .filter-btn.active { background: #333; color: #fff; border-color: #555; }
    .filter-btn:hover:not(.active) { background: #222; }

    /* Activity Table */
    .activity-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-bottom: 16px; }
    .activity-table th {
      text-align: left;
      padding: 8px 6px;
      border-bottom: 1px solid #333;
      color: #666;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.65rem;
      letter-spacing: 0.5px;
    }
    .activity-table td {
      padding: 6px;
      border-bottom: 1px solid #1a1a1a;
      color: #888;
      vertical-align: top;
    }
    .activity-table tr:hover td { background: #1a1a1a; }
    .activity-table .col-time { width: 110px; white-space: nowrap; color: #666; }
    .activity-table .col-type { width: 50px; }
    .activity-table .col-agent { width: 60px; color: #60a5fa; }
    .activity-table .col-from, .activity-table .col-to { width: 130px; }
    .activity-table .col-model { width: 55px; }
    .activity-table .col-tokens { width: 50px; text-align: right; }
    .activity-table .col-cost { width: 55px; text-align: right; }
    .activity-table .col-subject { min-width: 120px; max-width: 200px; }
    .activity-type {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.6rem;
      text-transform: uppercase;
    }
    .type-api { background: #1e3a5f; color: #60a5fa; }
    .type-scheduled { background: #1e3a3a; color: #2dd4bf; }
    .type-email-in { background: #14532d; color: #22c55e; }
    .type-email-out { background: #7c2d12; color: #f97316; }
    .type-inter { background: #4a1d6a; color: #a855f7; }

    .load-more {
      display: block;
      width: 100%;
      padding: 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #888;
      cursor: pointer;
      text-align: center;
      font-size: 0.85rem;
    }
    .load-more:hover { background: #222; color: #fff; }

    /* Month Spend Collapsible */
    .collapsible-header { display: flex; align-items: center; cursor: pointer; gap: 8px; }
    .collapsible-header:hover { opacity: 0.8; }
    .collapse-icon { transition: transform 0.2s; font-size: 0.7rem; color: #666; }
    .collapse-icon.open { transform: rotate(90deg); }
    .month-spend-content { display: none; margin-top: 8px; background: #111; border-radius: 6px; padding: 12px; margin-bottom: 16px; max-width: 280px; }
    .month-spend-content.open { display: block; }
    .month-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.8rem; border-bottom: 1px solid #1a1a1a; }
    .month-row:last-child { border-bottom: none; }
    .month-agent { color: #888; }
    .month-amount { color: #60a5fa; }
    .month-total { margin-top: 8px; padding-top: 8px; border-top: 1px solid #333; font-weight: 600; }

    /* Usage Chart */
    .chart-section { margin-bottom: 16px; }
    .chart-container {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px;
      height: 300px;
      min-height: 150px;
      max-height: 800px;
      resize: vertical;
      overflow: hidden;
      position: relative;
    }
    .chart-controls { display: flex; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; align-items: center; }
    .chart-controls-row { display: flex; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; align-items: center; }
    .chart-controls .separator { color: #333; margin: 0 4px; }
    .chart-agent-btn { min-width: unset; }
    .chart-agent-btn.active { color: #fff; }
    .chart-datetime-input {
      padding: 4px 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #fff;
      font-size: 0.75rem;
    }
    .chart-datetime-input::-webkit-calendar-picker-indicator { filter: invert(1); }

    /* Range Slider */
    .range-slider-container {
      position: relative;
      height: 32px;
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      margin-top: 6px;
      margin-bottom: 12px;
      user-select: none;
      cursor: default;
    }
    .range-slider-track {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    .range-slider-selected {
      position: absolute;
      top: 0; bottom: 0;
      background: rgba(96, 165, 250, 0.15);
      border-left: 2px solid #60a5fa;
      border-right: 2px solid #60a5fa;
      cursor: grab;
    }
    .range-slider-selected:active { cursor: grabbing; }
    .range-slider-handle {
      position: absolute;
      top: 0; bottom: 0;
      width: 8px;
      background: #60a5fa;
      border-radius: 2px;
      cursor: ew-resize;
      z-index: 2;
    }
    .range-slider-handle:hover { background: #93c5fd; }
    .range-slider-handle.left { left: -4px; }
    .range-slider-handle.right { right: -4px; }

    /* Misc */
    .truncate { cursor: help; }
    .loading { color: #666; padding: 40px; text-align: center; }
    .error { color: #ef4444; padding: 40px; text-align: center; }
    .refresh { position: fixed; top: 16px; right: 16px; background: #333; border: none; color: #fff; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; z-index: 50; }
    .refresh:hover { background: #444; }
    .timestamp { color: #666; font-size: 0.75rem; margin-bottom: 16px; }

    /* Tab switcher */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid #333; }
    .tab-btn {
      padding: 8px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #888;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .tab-btn.active { color: #fff; border-bottom-color: #22c55e; }
    .tab-btn:hover:not(.active) { color: #ccc; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Product tab — phone-first vitals */
    .liveness-banner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 24px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-left: 4px solid #666;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .liveness-banner.live { border-left-color: #22c55e; }
    .liveness-banner.check { border-left-color: #ef4444; }
    .liveness-status { font-size: 1.4rem; font-weight: 700; }
    .liveness-banner.live .liveness-status { color: #22c55e; }
    .liveness-banner.check .liveness-status { color: #ef4444; }
    .liveness-meta { display: flex; flex-direction: column; gap: 2px; font-size: 0.8rem; color: #888; }
    .liveness-meta .err { color: #ef4444; font-weight: 600; }

    /* Per-subsystem health lights (Step 78 Half B). Same colour language as
       .status-dot (active/halted/idle) + an amber `warn`, but a separate class:
       .status-dot is position:absolute for the agent-card corner and can't be
       reused inline. Wraps on narrow screens (phone-first). */
    .health-lights { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .health-light {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 12px;
    }
    .health-light.idle-light { opacity: 0.55; }
    .health-dot { width: 9px; height: 9px; border-radius: 50%; background: #666; flex-shrink: 0; }
    .health-dot.active { background: #22c55e; }
    .health-dot.halted { background: #ef4444; }
    .health-dot.warn { background: #eab308; }
    .health-dot.idle { background: #666; }
    .health-label { font-size: 0.75rem; font-weight: 600; color: #ccc; }
    .health-sub { font-size: 0.68rem; color: #666; }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-bottom: 16px; }
    .stat-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px;
      text-align: center;
    }
    .stat-value { font-size: 1.6rem; font-weight: 700; color: #fff; }
    .stat-value.green { color: #22c55e; }
    .stat-value.yellow { color: #eab308; }
    .stat-label { font-size: 0.7rem; color: #888; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

    .cost-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .cost-row .stat-card { flex: 1; }
    .cost-value { font-size: 1.4rem; font-weight: 700; color: #60a5fa; }
    .cost-breakdown { font-size: 0.75rem; color: #888; }
    .cost-breakdown-label { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin: 8px 0 2px; }
    .cost-breakdown-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #1a1a1a; }
    .cost-breakdown-row:last-child { border-bottom: none; }

    .cluster-card {
      background: #111;
      border: 1px dashed #333;
      border-radius: 6px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
    }
    .cluster-card .stat-value { color: #666; }
    .cluster-card .stat-label { color: #666; }

    .product-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .product-table th {
      text-align: left;
      padding: 8px 6px;
      border-bottom: 1px solid #333;
      color: #666;
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.65rem;
      letter-spacing: 0.5px;
    }
    .product-table td { padding: 8px 6px; border-bottom: 1px solid #1a1a1a; color: #ccc; vertical-align: top; }
    .product-table .col-time { white-space: nowrap; color: #666; width: 90px; }
    .status-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.65rem;
      background: #333;
      color: #ccc;
      text-transform: lowercase;
    }
    .status-pill.delivered, .status-pill.matched { background: #14532d; color: #22c55e; }
    .status-pill.pending_approval { background: #422006; color: #eab308; }
    .status-pill.passed, .status-pill.ignored { background: #1f2937; color: #9ca3af; }
    .status-pill.error, .status-pill.escalated, .status-pill.bad_actor { background: #7f1d1d; color: #ef4444; }
    .result-pill { font-size: 0.65rem; padding: 2px 6px; border-radius: 3px; }
    .result-pill.gold { background: #422006; color: #fbbf24; }
    .result-pill.edge { background: #1e3a5f; color: #60a5fa; }
    .result-pill.pass { background: #1f2937; color: #9ca3af; }
    .product-notice { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 24px; text-align: center; color: #888; }

    /* ===== Team Runtime tab ===== */
    .tr-note { font-size: 0.72rem; color: #777; margin: 4px 0 14px; }
    .tr-runtime-light {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.85rem; font-weight: 600;
      padding: 8px 14px; border-radius: 8px;
      background: #1a1a1a; border: 1px solid #333; margin-bottom: 4px;
    }
    .tr-runtime-light .dot { width: 10px; height: 10px; border-radius: 50%; background: #666; }
    .tr-runtime-light.alive { border-color: #22c55e; color: #22c55e; }
    .tr-runtime-light.alive .dot { background: #22c55e; }
    .tr-runtime-light.down { border-color: #ef4444; color: #ef4444; }
    .tr-runtime-light.down .dot { background: #ef4444; }

    .tr-card {
      background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
      padding: 16px; margin-bottom: 14px;
    }
    .tr-card.master { border-left: 4px solid #666; }
    .tr-card.master.paused { border-left-color: #eab308; }
    .tr-card.master.killed { border-left-color: #ef4444; }
    .tr-card.agent { border-left: 4px solid #666; }
    .tr-card.agent.active { border-left-color: #22c55e; }
    .tr-card.agent.paused { border-left-color: #eab308; }
    .tr-card.agent.hardpaused { border-left-color: #f97316; }
    .tr-card.agent.killed { border-left-color: #ef4444; }

    .tr-card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .tr-title { font-size: 1.05rem; font-weight: 700; color: #fff; }
    .tr-statuslight { display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .tr-statuslight .dot { width: 9px; height: 9px; border-radius: 50%; }
    .tr-statuslight.active { color: #22c55e; } .tr-statuslight.active .dot { background: #22c55e; }
    .tr-statuslight.paused { color: #eab308; } .tr-statuslight.paused .dot { background: #eab308; }
    .tr-statuslight.hardpaused { color: #f97316; } .tr-statuslight.hardpaused .dot { background: #f97316; }
    .tr-statuslight.killed { color: #ef4444; } .tr-statuslight.killed .dot { background: #ef4444; }

    .tr-meta { font-size: 0.75rem; color: #888; margin-top: 6px; display: flex; flex-direction: column; gap: 2px; }
    .tr-meta .k { color: #666; }

    .tr-controls { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .tr-btn {
      padding: 6px 14px; border-radius: 6px; cursor: pointer;
      font-size: 0.78rem; font-weight: 600; border: 1px solid #333;
      background: #222; color: #ddd;
    }
    .tr-btn:hover { background: #2a2a2a; }
    .tr-btn.pause { border-color: #eab308; color: #eab308; }
    .tr-btn.hard { border-color: #f97316; color: #f97316; }
    .tr-btn.resume { border-color: #22c55e; color: #22c55e; }
    .tr-btn.kill { border-color: #ef4444; color: #ef4444; }
    .tr-btn.confirm { background: #7f1d1d; border-color: #ef4444; color: #fff; }

    /* Reason UX */
    .tr-reason-wrap { margin-top: 12px; }
    .tr-reason-label { font-size: 0.68rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .tr-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .tr-chip {
      padding: 3px 10px; border-radius: 12px; font-size: 0.72rem; cursor: pointer;
      background: #222; border: 1px solid #333; color: #aaa;
    }
    .tr-chip:hover { background: #2a2a2a; color: #fff; }
    .tr-reason-input {
      width: 100%; max-width: 360px; padding: 6px 10px; border-radius: 6px;
      background: #0a0a0a; border: 1px solid #333; color: #fff; font-size: 0.78rem;
    }
    .tr-reason-current { font-size: 0.75rem; color: #999; margin-top: 4px; }
    .tr-reason-current .txt { color: #ddd; }

    /* Capabilities panel */
    .tr-caps { margin-top: 14px; border-top: 1px solid #262626; padding-top: 12px; }
    .tr-caps-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .tr-caps-title { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .tr-tiers { display: flex; gap: 6px; flex-wrap: wrap; }
    .tr-tier-btn {
      padding: 4px 10px; border-radius: 6px; font-size: 0.72rem; cursor: pointer;
      background: #1e293b; border: 1px solid #334155; color: #93c5fd;
    }
    .tr-tier-btn:hover { background: #24344d; }
    .tr-tier-note { font-size: 0.68rem; color: #666; margin-top: 4px; }

    .tr-cap { border-bottom: 1px solid #1a1a1a; }
    .tr-cap:last-child { border-bottom: none; }
    .tr-cap-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; }
    .tr-twirl { cursor: pointer; color: #666; font-size: 0.7rem; width: 12px; user-select: none; transition: transform 0.15s; display: inline-block; }
    .tr-twirl.open { transform: rotate(90deg); }
    .tr-cap-name { flex: 1; font-size: 0.8rem; color: #ddd; }
    .tr-cap-name .star { color: #fbbf24; margin-right: 4px; }
    .tr-cap-desc { display: none; font-size: 0.74rem; color: #888; padding: 0 0 8px 22px; line-height: 1.45; }
    .tr-cap-desc.open { display: block; }

    /* Toggle switch */
    .tr-toggle { position: relative; width: 38px; height: 20px; flex-shrink: 0; }
    .tr-toggle input { opacity: 0; width: 0; height: 0; }
    .tr-toggle .slider {
      position: absolute; inset: 0; cursor: pointer; background: #333;
      border-radius: 20px; transition: background 0.15s;
    }
    .tr-toggle .slider::before {
      content: ''; position: absolute; height: 14px; width: 14px; left: 3px; top: 3px;
      background: #999; border-radius: 50%; transition: transform 0.15s;
    }
    .tr-toggle input:checked + .slider { background: #16653433; border: 1px solid #22c55e; }
    .tr-toggle input:checked + .slider::before { transform: translateX(18px); background: #22c55e; }

    .tr-section-label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 8px; }
    .tr-empty { background: #111; border: 1px dashed #333; border-radius: 8px; padding: 20px; text-align: center; color: #666; font-size: 0.82rem; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
</head>
<body>
  <!-- Login Overlay -->
  <div id="login-overlay" style="display:none; position:fixed; inset:0; background:#0a0a0a; z-index:100; display:flex; align-items:center; justify-content:center;">
    <div style="background:#1a1a1a; padding:40px; border-radius:8px; border:1px solid #333; text-align:center;">
      <h2 style="color:#fff; margin-bottom:20px;">Evryn Dashboard</h2>
      <div style="position:relative; display:inline-block;">
        <input type="password" id="password-input" placeholder="Password" style="padding:10px; width:200px; border:1px solid #333; background:#0a0a0a; color:#fff; border-radius:4px; padding-right:35px;">
        <button type="button" id="toggle-pw" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; color:#666; cursor:pointer; font-size:14px;">Show</button>
      </div>
      <br><br>
      <button id="login-btn" style="padding:10px 30px; background:#333; color:#fff; border:none; border-radius:4px; cursor:pointer;">Login</button>
      <div id="login-error" style="color:#ef4444; margin-top:10px; display:none;">Invalid password</div>
    </div>
  </div>

  <button class="refresh" onclick="loadData()">Refresh</button>
  <h1>Evryn Dashboard</h1>
  <div class="timestamp" id="timestamp">Loading...</div>

  <!-- Tab switcher -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="product-tab">Evryn Product</button>
    <button class="tab-btn" data-tab="team-tab">Team Runtime</button>
    <button class="tab-btn" data-tab="agents-tab">Agents</button>
  </div>

  <!-- Agents Tab -->
  <div id="agents-tab" class="tab-pane">
    <h2>Status</h2>
    <div class="legend" id="status-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e;"></div> Active (5 min)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#666;"></div> Idle</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444;"></div> Halted</div>
    </div>
    <div class="agent-grid" id="agent-grid">
      <div class="loading">Loading...</div>
    </div>

    <div class="collapsible-header" onclick="toggleMonthSpend()">
      <span class="collapse-icon" id="month-icon">&#9654;</span>
      <h2 style="margin: 0;">Month Spend: <span id="month-total-header">$0.00</span></h2>
    </div>
    <div class="month-spend-content" id="month-spend">
      <div id="month-breakdown"></div>
    </div>

    <h2>Usage Over Time</h2>
    <div class="chart-section">
      <div class="chart-controls" id="chart-controls">
        <div class="chart-controls-row">
          <span class="filters-label">Metric:</span>
          <button class="filter-btn active" data-metric="cost">Cost</button>
          <button class="filter-btn" data-metric="tokens">Tokens</button>
          <span class="separator">|</span>
          <span class="filters-label">Zoom:</span>
          <button class="filter-btn active" data-zoom="day">Day</button>
          <button class="filter-btn" data-zoom="week">Week</button>
          <button class="filter-btn" data-zoom="now">Now</button>
          <span class="separator">|</span>
          <input type="datetime-local" class="chart-datetime-input" id="chart-from" step="60">
          <span style="color:#666;">to</span>
          <input type="datetime-local" class="chart-datetime-input" id="chart-to" step="60">
        </div>
        <div class="chart-controls-row">
          <button class="filter-btn active" data-chart-action="total">Total</button>
          <button class="filter-btn" data-chart-action="all">All</button>
          <button class="filter-btn" data-chart-action="none">None</button>
          <span class="separator">|</span>
          <button class="filter-btn chart-agent-btn" data-chart-agent="thea" style="border-color:#22c55e;">Thea</button>
          <button class="filter-btn chart-agent-btn" data-chart-agent="lucas" style="border-color:#60a5fa;">Lucas</button>
          <button class="filter-btn chart-agent-btn" data-chart-agent="alex" style="border-color:#a855f7;">Alex</button>
          <button class="filter-btn chart-agent-btn" data-chart-agent="taylor" style="border-color:#eab308;">Taylor</button>
          <button class="filter-btn chart-agent-btn" data-chart-agent="dana" style="border-color:#f97316;">Dana</button>
          <button class="filter-btn chart-agent-btn" data-chart-agent="jordan" style="border-color:#ec4899;">Jordan</button>
          <button class="filter-btn chart-agent-btn" data-chart-agent="dominic" style="border-color:#2dd4bf;">Dominic</button>
          <button class="filter-btn chart-agent-btn" data-chart-agent="nathan" style="border-color:#f43f5e;">Nathan</button>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="usage-chart"></canvas>
      </div>
      <div class="range-slider-container" id="range-slider">
        <div class="range-slider-track" id="range-track"></div>
        <div class="range-slider-selected" id="range-selected">
          <div class="range-slider-handle left" id="range-handle-left"></div>
          <div class="range-slider-handle right" id="range-handle-right"></div>
        </div>
      </div>
    </div>

    <h2>Activity</h2>
    <div class="filters" id="filters">
      <span class="filters-label">Filter:</span>
      <button class="filter-btn" data-action="all">All</button>
      <button class="filter-btn" data-action="none">None</button>
      <span style="color:#333; margin: 0 4px;">|</span>
      <button class="filter-btn active" data-filter="api">API</button>
      <button class="filter-btn active" data-filter="scheduled">Scheduled</button>
      <button class="filter-btn active" data-filter="email-in">Emails In</button>
      <button class="filter-btn active" data-filter="email-out">Emails Out</button>
      <button class="filter-btn active" data-filter="inter_agent">Inter-Agent</button>
    </div>
    <div class="activity-wrapper" style="overflow-x: auto;">
      <table class="activity-table">
        <thead>
          <tr>
            <th class="col-time">Time</th>
            <th class="col-type">Type</th>
            <th class="col-agent">Agent</th>
            <th class="col-from">From</th>
            <th class="col-to">To</th>
            <th class="col-model">Model</th>
            <th class="col-tokens">Tokens</th>
            <th class="col-cost">Cost</th>
            <th class="col-subject">Subject</th>
            <th>Task/Message</th>
          </tr>
        </thead>
        <tbody id="activity-body">
          <tr><td colspan="10" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    <button class="load-more" id="load-more" style="display:none;">Load More</button>
  </div>

  <!-- Evryn Product Tab -->
  <div id="product-tab" class="tab-pane active">
    <div id="product-content">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <!-- Team Runtime Tab -->
  <div id="team-tab" class="tab-pane">
    <div id="team-content">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script>
    const agents = ['Thea', 'Lucas', 'Alex', 'Taylor', 'Dana', 'Jordan', 'Dominic', 'Nathan'];
    let activeFilters = new Set(['api', 'scheduled', 'email-in', 'email-out', 'inter_agent']);
    let activityData = [];
    let allActivityData = [];
    let displayedCount = 10;
    let dateFrom = null;
    let dateTo = null;

    function getTodayPacific() {
      const now = new Date();
      // Get Pacific time date string
      return now.toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
    }


    function initDateRange() {
      const today = getTodayPacific();
      dateFrom = today;
      dateTo = today;
    }

    // Called by the chart whenever visible range changes — syncs activity table
    function syncActivityDateRange() {
      if (typeof getChartVisibleRange !== 'function' || !usageChart || !usageChart.scales.x) return;
      const { min, max } = getChartVisibleRange();
      dateFrom = new Date(min).toISOString().split('T')[0];
      dateTo = new Date(max).toISOString().split('T')[0];
      displayedCount = 10;
      renderActivity();
    }

    function toggleMonthSpend() {
      document.getElementById('month-spend').classList.toggle('open');
      document.getElementById('month-icon').classList.toggle('open');
    }

    function renderMonthSpend(monthSpend) {
      document.getElementById('month-total-header').textContent = '$' + (monthSpend.total || 0).toFixed(2);
      let html = '';
      const agentOrder = ['thea', 'lucas', 'alex', 'taylor', 'dana', 'jordan', 'dominic', 'nathan'];
      const sortedAgents = agentOrder
        .map(name => [name, (monthSpend.byAgent || {})[name] || 0])
        .filter(([_, amount]) => amount > 0);
      sortedAgents.forEach(([agent, amount]) => {
        const capitalizedAgent = agent.charAt(0).toUpperCase() + agent.slice(1);
        html += `<div class="month-row"><span class="month-agent">${capitalizedAgent}</span><span class="month-amount">$${amount.toFixed(3)}</span></div>`;
      });
      html += `<div class="month-row month-total"><span>Total</span><span class="month-amount">$${(monthSpend.total || 0).toFixed(2)}</span></div>`;
      document.getElementById('month-breakdown').innerHTML = html;
    }

    function formatDateTime(isoString) {
      if (!isoString) return '-';
      const d = new Date(isoString);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
             d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    function getSpendClass(spend, alert, halt) {
      if (spend >= halt) return 'red';
      if (spend >= alert) return 'yellow';
      return 'green';
    }

    function getStatusClass(status) {
      if (status.halted) return 'halted';
      if (!status.lastActivity) return 'idle';
      const lastTime = new Date(status.lastActivity).getTime();
      const fiveMinAgo = Date.now() - 5 * 60 * 1000;
      return lastTime > fiveMinAgo ? 'active' : 'idle';
    }

    function truncate(str, len, alwaysTooltip = false) {
      if (!str) return '';
      const escaped = str.replace(/"/g, '&quot;').replace(/</g, '&lt;');
      if (str.length > len) {
        return `<span class="truncate" title="${escaped}">${str.substring(0, len)}...</span>`;
      }
      if (alwaysTooltip) {
        return `<span class="truncate" title="${escaped}">${escaped}</span>`;
      }
      return escaped;
    }

    function getActivityTypeClass(item) {
      if (item.type === 'api_call') {
        if (item.trigger_type === 'scheduled' || item.trigger_type === 'reflection') return 'type-scheduled';
        if (item.trigger_type === 'inter_agent') return 'type-inter';
        return 'type-api';
      }
      if (item.type === 'message') {
        if (item.message_type === 'inter_agent') return 'type-inter';
        return item.direction === 'inbound' ? 'type-email-in' : 'type-email-out';
      }
      return '';
    }

    function getActivityTypeLabel(item) {
      if (item.type === 'api_call') {
        if (item.trigger_type === 'scheduled' || item.trigger_type === 'reflection') return 'Sched';
        if (item.trigger_type === 'inter_agent') return 'Invoke';
        return 'API';
      }
      if (item.type === 'message') {
        if (item.message_type === 'inter_agent') return 'Invoke';
        return item.direction === 'inbound' ? 'In' : 'Out';
      }
      return '';
    }

    function getFilterKeys(item) {
      // Returns array of filter keys this item matches (can match multiple)
      const keys = [];
      if (item.type === 'api_call') {
        // Scheduled includes 'scheduled' and 'reflection' trigger types
        if (item.trigger_type === 'scheduled' || item.trigger_type === 'reflection') {
          keys.push('scheduled');
        }
        // Inter-agent API calls
        if (item.trigger_type === 'inter_agent') {
          keys.push('inter_agent');
        }
        // All API calls also match 'api' filter
        keys.push('api');
      }
      if (item.type === 'message') {
        if (item.message_type === 'inter_agent') {
          keys.push('inter_agent');
        } else {
          // Regular email messages
          keys.push(item.direction === 'inbound' ? 'email-in' : 'email-out');
        }
      }
      return keys.length > 0 ? keys : ['other'];
    }

    function matchesFilters(item) {
      const itemKeys = getFilterKeys(item);
      return itemKeys.some(key => activeFilters.has(key));
    }

    let authHeader = localStorage.getItem('evryn_auth') || null;

    function showLogin(showError = false) {
      document.getElementById('login-overlay').style.display = 'flex';
      document.getElementById('login-error').style.display = showError ? 'block' : 'none';
      document.getElementById('password-input').focus();
    }

    function hideLogin() {
      document.getElementById('login-overlay').style.display = 'none';
    }

    function doLogin() {
      const pass = document.getElementById('password-input').value;
      if (pass) {
        authHeader = 'Basic ' + btoa('evryn:' + pass);
        localStorage.setItem('evryn_auth', authHeader);
        hideLogin();
        loadData();
        loadProductData();
        loadTeamData();
      }
    }

    // Multi-select filter toggling
    const allFilterKeys = ['api', 'scheduled', 'email-in', 'email-out', 'inter_agent'];

    function updateFilterButtons() {
      document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
        if (activeFilters.has(btn.dataset.filter)) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    document.getElementById('filters').addEventListener('click', (e) => {
      if (!e.target.classList.contains('filter-btn')) return;

      const action = e.target.dataset.action;
      const filter = e.target.dataset.filter;

      if (action === 'none') {
        activeFilters.clear();
        updateFilterButtons();
      } else if (action === 'all') {
        allFilterKeys.forEach(k => activeFilters.add(k));
        updateFilterButtons();
      } else if (filter) {
        if (activeFilters.has(filter)) {
          activeFilters.delete(filter);
          e.target.classList.remove('active');
        } else {
          activeFilters.add(filter);
          e.target.classList.add('active');
        }
      }
      displayedCount = 10;
      renderActivity();
    });

    // Load more
    document.getElementById('load-more').addEventListener('click', () => {
      displayedCount += 10;
      renderActivity();
    });

    function matchesDateRange(item) {
      if (!dateFrom || !dateTo) return true;
      const itemDate = item.created_at ? item.created_at.split('T')[0] : null;
      if (!itemDate) return true;
      return itemDate >= dateFrom && itemDate <= dateTo;
    }

    function renderActivity() {
      const filtered = allActivityData.filter(item => matchesFilters(item) && matchesDateRange(item));
      const toShow = filtered.slice(0, displayedCount);

      let html = '';
      if (toShow.length === 0) {
        html = '<tr><td colspan="10" class="loading">No activity matching filters</td></tr>';
      } else {
        toShow.forEach(item => {
          const isApi = item.type === 'api_call';
          const isMessage = item.type === 'message';
          const from = isMessage ? truncate(item.from_address, 25) : '';
          const to = isMessage ? truncate(item.to_address, 25) : '';
          const model = isApi ? (item.model || '') : '';
          const tokens = isApi ? (item.tokens || 0) : '';
          const cost = isApi ? '$' + (item.cost_usd || 0).toFixed(4) : '';
          const subject = isMessage ? truncate(item.subject, 30, true) : '';
          const task = isApi ? truncate(item.description, 50) : truncate(item.body, 50);

          html += `
            <tr>
              <td class="col-time">${formatDateTime(item.created_at)}</td>
              <td class="col-type"><span class="activity-type ${getActivityTypeClass(item)}">${getActivityTypeLabel(item)}</span></td>
              <td class="col-agent">${item.agent_name}</td>
              <td class="col-from">${from}</td>
              <td class="col-to">${to}</td>
              <td class="col-model">${model}</td>
              <td class="col-tokens">${tokens}</td>
              <td class="col-cost">${cost}</td>
              <td class="col-subject">${subject}</td>
              <td>${task}</td>
            </tr>
          `;
        });
      }
      document.getElementById('activity-body').innerHTML = html;
      document.getElementById('load-more').style.display = filtered.length > displayedCount ? 'block' : 'none';
    }

    async function loadData() {
      try {
        if (!authHeader) {
          showLogin();
          return;
        }

        const res = await fetch('/api/data', { headers: { 'Authorization': authHeader } });

        if (res.status === 401) {
          localStorage.removeItem('evryn_auth');
          authHeader = null;
          showLogin(true);
          return;
        }

        if (!res.ok) throw new Error('Failed to fetch');
        const data = await res.json();

        document.getElementById('timestamp').textContent = `${data.today} | Refreshed ${new Date().toLocaleTimeString()}`;

        // Build agent grid
        let agentHtml = '';
        agents.forEach(agent => {
          const agentKey = agent.toLowerCase();
          const status = data.agentStatus?.[agentKey] || { todaySpend: 0, halted: false, lastActivity: null };
          const spend = status.todaySpend || 0;
          const cls = getSpendClass(spend, data.alertThreshold, data.haltThreshold);
          const statusCls = getStatusClass(status);
          agentHtml += `
            <div class="agent-card ${cls} ${status.halted ? 'halted' : ''}">
              <div class="status-dot ${statusCls}" title="${statusCls}"></div>
              <div class="agent-name">${agent}</div>
              <div class="agent-spend ${cls}">$${spend.toFixed(3)}</div>
              <div class="agent-budget">/ $${data.budgetPerAgent.toFixed(2)}</div>
            </div>
          `;
        });
        document.getElementById('agent-grid').innerHTML = agentHtml;

        // Store all activity data and render
        allActivityData = data.activity || [];
        renderActivity();

        // Render month spend
        renderMonthSpend(data.monthSpend || { byAgent: {}, total: 0 });

        // Refresh usage chart
        loadUsageData();

      } catch (err) {
        console.error(err);
        document.getElementById('agent-grid').innerHTML = '<div class="error">Failed to load data</div>';
      }
    }

    // ========== Tab switcher ==========
    document.querySelector('.tabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      const target = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === target));
    });

    // ========== Product / Evryn vitals ==========
    function timeAgo(isoString) {
      if (!isoString) return 'never';
      const diffMs = Date.now() - new Date(isoString).getTime();
      if (diffMs < 0) return 'just now';
      const mins = Math.floor(diffMs / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 48) return hrs + 'h ago';
      return Math.floor(hrs / 24) + 'd ago';
    }

    function formatUptime(seconds) {
      if (seconds == null) return '';
      const s = Math.floor(seconds);
      if (s < 60) return s + 's';
      const m = Math.floor(s / 60);
      if (m < 60) return m + 'm';
      const h = Math.floor(m / 60);
      if (h < 48) return h + 'h ' + (m % 60) + 'm';
      return Math.floor(h / 24) + 'd ' + (h % 24) + 'h';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ===== Per-subsystem health lights (Step 78 Half B) =====
    // Renders 5 lights off the /health `checks` (db / slack_socket / poll / m1)
    // plus the existing 24h error count.
    //
    // GRACEFUL DEGRADE (load-bearing — Half A is not deployed yet): the /health
    // live in prod still answers in the OLD shape (no `checks`), so the API sends
    // checks:null. The 4 health lights then render IDLE ("—"), never a false red
    // and never a broken layout. Same for an unreachable backend (health:null).
    // The errors light always renders — it reads live.recentErrors, not /health.
    function healthLight(label, dotClass, sub) {
      const subHtml = sub ? `<span class="health-sub">${escapeHtml(sub)}</span>` : '';
      const dim = dotClass === 'idle' ? ' idle-light' : '';
      return `<div class="health-light${dim}"><span class="health-dot ${dotClass}"></span>` +
        `<span class="health-label">${escapeHtml(label)}</span>${subHtml}</div>`;
    }

    function renderHealthLights(live) {
      const checks = (live.health && live.health.checks) ? live.health.checks : null;

      // db / slack_socket: green when ok, red when not, idle when checks absent.
      function okLight(label, check) {
        if (!checks || !check) return healthLight(label, 'idle', '—');
        return healthLight(label, check.ok ? 'active' : 'halted', '');
      }

      let lights = '';
      lights += okLight('DB', checks && checks.db);
      lights += okLight('Slack', checks && checks.slack_socket);

      // Poll — same tri-state, plus age_seconds as a subtle sub-label. The age is
      // shown whether or not poll is ok: on a wedge it's the most useful number.
      if (!checks || !checks.poll) {
        lights += healthLight('Poll', 'idle', '—');
      } else {
        const age = checks.poll.age_seconds;
        const ageSub = (typeof age === 'number') ? formatUptime(age) : '';
        lights += healthLight('Poll', checks.poll.ok ? 'active' : 'halted', ageSub);
      }

      // M1 breaker. A trip is a DELIBERATE halt (M1 fires its own alert; no
      // auto-reset — ADR-041), which is why /health reports it 200 "halted" not
      // 503. So label it HALTED + the reason, not a generic "down".
      if (!checks || !checks.m1) {
        lights += healthLight('M1', 'idle', '—');
      } else if (checks.m1.breaker_tripped) {
        const reason = checks.m1.reason ? ('HALTED · ' + checks.m1.reason) : 'HALTED';
        lights += healthLight('M1', 'halted', reason);
      } else {
        lights += healthLight('M1', 'active', 'OK');
      }

      // errors_24h — from the existing product-DB count, independent of /health.
      const errs = live.recentErrors || 0;
      lights += healthLight('Errors 24h', errs > 0 ? 'warn' : 'idle', String(errs));

      return `<div class="health-lights">${lights}</div>`;
    }

    function renderProduct(data) {
      const el = document.getElementById('product-content');

      if (data.configured === false) {
        el.innerHTML = '<div class="product-notice">Product DB not yet connected — set ' +
          '<code>PRODUCT_SUPABASE_URL</code> and <code>PRODUCT_SUPABASE_SERVICE_ROLE_KEY</code> ' +
          'env vars in Vercel.</div>';
        return;
      }

      const live = data.liveness || {};
      const act = data.today_activity || {};
      const cost = data.cost || {};

      // Liveness: green if process up OR last activity within ~26h.
      const recentMs = live.lastActivityAt ? (Date.now() - new Date(live.lastActivityAt).getTime()) : Infinity;
      const isLive = (live.processUp && live.processUp.ok) || recentMs <= 26 * 60 * 60 * 1000;
      const banner = isLive ? 'live' : 'check';
      const statusText = isLive ? '● Live' : '● Check';
      const uptimeStr = (live.processUp && live.processUp.ok)
        ? 'uptime ' + formatUptime(live.processUp.uptimeSeconds) : '';
      const errClass = (live.recentErrors > 0) ? 'err' : '';

      let html = `
        <div class="liveness-banner ${banner}">
          <div class="liveness-status">${statusText}</div>
          <div class="liveness-meta">
            <span>last activity ${timeAgo(live.lastActivityAt)}</span>
            ${uptimeStr ? `<span>${uptimeStr}</span>` : ''}
            <span class="${errClass}">${live.recentErrors || 0} errors (24h)</span>
          </div>
        </div>

        ${renderHealthLights(live)}

        <h2>Today's Activity</h2>
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-value">${act.itemsProcessed || 0}</div><div class="stat-label">Processed</div></div>
          <div class="stat-card"><div class="stat-value">${act.passed || 0}</div><div class="stat-label">Passed</div></div>
          <div class="stat-card"><div class="stat-value green">${act.goldEdgeSurfaced || 0}</div><div class="stat-label">Gold/Edge</div></div>
          <div class="stat-card"><div class="stat-value green">${act.delivered || 0}</div><div class="stat-label">Delivered</div></div>
          <div class="stat-card"><div class="stat-value ${act.pendingApproval > 0 ? 'yellow' : ''}">${act.pendingApproval || 0}</div><div class="stat-label">Pending</div></div>
        </div>

        <h2>Cost</h2>
        <div class="cost-row">
          <div class="stat-card"><div class="cost-value">$${(cost.todayUsd || 0).toFixed(2)}</div><div class="stat-label">Today</div></div>
          <div class="stat-card"><div class="cost-value">$${(cost.monthUsd || 0).toFixed(2)}</div><div class="stat-label">Month</div></div>
        </div>`;

      const byActivity = cost.todayByActivity || {};
      const actKeys = Object.keys(byActivity).filter(k => byActivity[k] > 0);
      if (actKeys.length > 0) {
        html += '<div class="cost-breakdown-label">By activity</div>';
        html += '<div class="cost-breakdown">';
        actKeys.sort((a, b) => byActivity[b] - byActivity[a]).forEach(k => {
          html += `<div class="cost-breakdown-row"><span>${escapeHtml(k)}</span><span>$${byActivity[k].toFixed(2)}</span></div>`;
        });
        html += '</div>';
      }

      // By-model spend cut (Opus vs. Haiku). Degrades cleanly: renders only
      // models with spend > 0, so when the Haiku screen ships OFF (Opus only)
      // the block shows just Opus; when todayByModel is empty/absent it renders
      // nothing at all (no empty box). Friendly label via substring test so a
      // dated model id (claude-opus-4-7-YYYYMMDD) still maps to Opus/Haiku.
      const byModel = cost.todayByModel || {};
      const modelKeys = Object.keys(byModel).filter(k => byModel[k] > 0);
      if (modelKeys.length > 0) {
        html += '<div class="cost-breakdown-label">By model</div>';
        html += '<div class="cost-breakdown">';
        modelKeys.sort((a, b) => byModel[b] - byModel[a]).forEach(k => {
          const lower = k.toLowerCase();
          const label = lower.includes('opus') ? 'Opus'
            : lower.includes('haiku') ? 'Haiku'
            : k;
          html += `<div class="cost-breakdown-row"><span>${escapeHtml(label)}</span><span>$${byModel[k].toFixed(2)}</span></div>`;
        });
        html += '</div>';
      }

      // Cluster heartbeat placeholder
      html += `
        <h2>Cluster Heartbeat</h2>
        <div class="cluster-card">
          <div class="stat-value">—</div>
          <div class="stat-label">daily cluster — coming soon</div>
        </div>`;

      // Recent items (status-only)
      html += '<h2>Recent Items</h2>';
      const items = data.recentItems || [];
      if (items.length === 0) {
        html += '<div class="product-notice">No items yet.</div>';
      } else {
        html += '<table class="product-table"><thead><tr>' +
          '<th class="col-time">Time</th><th>Status</th><th>Result</th><th>Subject</th>' +
          '</tr></thead><tbody>';
        items.forEach(it => {
          const result = it.triage_result
            ? `<span class="result-pill ${escapeHtml(it.triage_result)}">${escapeHtml(it.triage_result)}</span>` : '';
          html += `<tr>
            <td class="col-time">${formatDateTime(it.created_at)}</td>
            <td><span class="status-pill ${escapeHtml(it.status)}">${escapeHtml(it.status)}</span></td>
            <td>${result}</td>
            <td>${escapeHtml(it.subject) || '<span style="color:#555;">(no subject)</span>'}</td>
          </tr>`;
        });
        html += '</tbody></table>';
      }

      el.innerHTML = html;
    }

    async function loadProductData() {
      if (!authHeader) return;
      try {
        const res = await fetch('/api/product', { headers: { 'Authorization': authHeader } });
        if (res.status === 401) {
          localStorage.removeItem('evryn_auth');
          authHeader = null;
          showLogin(true);
          return;
        }
        if (!res.ok) throw new Error('Failed to fetch product data');
        const data = await res.json();
        renderProduct(data);
      } catch (err) {
        console.error('Product vitals error:', err);
        document.getElementById('product-content').innerHTML =
          '<div class="error">Failed to load product vitals</div>';
      }
    }

    // ========== Team Runtime tab ==========
    // Control panel for the founding-team autonomous runtime. Reads/writes the
    // SAME agent_state / agent_capabilities rows the runtime's gate checks — the
    // ~5s gate-cache TTL means a write bites within seconds. Renders inert off
    // { configured:false } until Justin sets TEAM_SUPABASE_* in Vercel.
    let teamData = null;
    // Which capability twirl-downs are open (persist across the 30s re-render).
    const teamOpenCaps = new Set(); // keys: `${agent}::${capability}`
    // Which kill buttons are mid-confirm (are-you-sure), so a re-render doesn't
    // silently reset them. Keys describe the exact action.
    const teamConfirming = new Set();
    const REASON_CHIPS = ['testing', 'misbehaving', 'budget', 'maintenance'];

    // POST an action to /api/team, then reload the panel so the UI shows truth
    // (the server echoes the updated row; we re-fetch the whole panel for the
    // simplest correct render). Pause fires instantly — reason is applied AFTER.
    async function teamAction(payload) {
      if (!authHeader) return null;
      try {
        const res = await fetch('/api/team', {
          method: 'POST',
          headers: { 'Authorization': authHeader, 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (res.status === 401) {
          localStorage.removeItem('evryn_auth'); authHeader = null; showLogin(true); return null;
        }
        const json = await res.json().catch(() => ({}));
        if (!res.ok) {
          console.error('Team action failed:', payload.action, json);
          alert('Action failed: ' + (json.error || res.status));
          return null;
        }
        await loadTeamData(); // re-render off fresh truth
        return json;
      } catch (err) {
        console.error('Team action error:', err);
        alert('Action error — see console.');
        return null;
      }
    }

    // Derive a status label/class from a state row's flags.
    // killed = hard_paused AND a KILL-prefixed reason; hardpaused = hard_paused
    // (pause); paused = inactive but not hard; active = active.
    function trStatus(row) {
      const reason = row.killed_reason || '';
      if (!row.active && row.hard_paused && reason.startsWith('KILL')) return 'killed';
      if (!row.active && row.hard_paused) return 'hardpaused';
      if (!row.active) return 'paused';
      return 'active';
    }
    function trStatusText(s) {
      return { active: 'Active', paused: 'Paused', hardpaused: 'Hard-paused', killed: 'Killed' }[s] || s;
    }
    // Strip the PAUSE:/KILL: prefix for display of just the human text (if any).
    function trReasonDisplay(reason) {
      if (!reason) return '';
      return escapeHtml(reason);
    }

    // Build the reason UX block (chips + free-text + current), wired to set_reason.
    // target is the agent name or 'all'. NOTHING here blocks the pause — it only
    // sets/edits the audit reason after the fact.
    function trReasonBlock(target, currentReason) {
      const chips = REASON_CHIPS.map(c =>
        `<span class="tr-chip" data-tr-reason-chip="${escapeHtml(target)}" data-tr-reason-text="${c}">${c}</span>`
      ).join('');
      const curTxt = currentReason
        ? `<div class="tr-reason-current">reason: <span class="txt">${trReasonDisplay(currentReason)}</span></div>` : '';
      return `
        <div class="tr-reason-wrap">
          <div class="tr-reason-label">Reason (optional — editable any time)</div>
          <div class="tr-chips">${chips}</div>
          <input class="tr-reason-input" type="text" placeholder="add a note…"
                 data-tr-reason-input="${escapeHtml(target)}">
          ${curTxt}
        </div>`;
    }

    // Capabilities panel for one agent (twirl-down + toggles + essentials-first + tiers).
    function trCapsPanel(agent, capabilities, tiers) {
      let tierBtns = (tiers || []).map(t =>
        `<button class="tr-tier-btn" data-tr-tier="${escapeHtml(t.tier)}" data-tr-tier-agent="${escapeHtml(agent.agent)}"
                 title="${escapeHtml(t.description || '')}">${escapeHtml(t.tier)}</button>`
      ).join('');

      let capRows = (capabilities || []).map(c => {
        const key = agent.agent + '::' + c.capability;
        const open = teamOpenCaps.has(key);
        const star = c.essential ? '<span class="star" title="essential">★</span>' : '';
        return `
          <div class="tr-cap">
            <div class="tr-cap-row">
              <span class="tr-twirl ${open ? 'open' : ''}" data-tr-twirl="${escapeHtml(key)}">&#9654;</span>
              <span class="tr-cap-name">${star}${escapeHtml(c.capability)}</span>
              <label class="tr-toggle">
                <input type="checkbox" ${c.granted ? 'checked' : ''}
                       data-tr-cap-agent="${escapeHtml(agent.agent)}" data-tr-cap="${escapeHtml(c.capability)}">
                <span class="slider"></span>
              </label>
            </div>
            <div class="tr-cap-desc ${open ? 'open' : ''}" data-tr-desc="${escapeHtml(key)}">${escapeHtml(c.description || '')}</div>
          </div>`;
      }).join('');

      return `
        <div class="tr-caps">
          <div class="tr-caps-head">
            <span class="tr-caps-title">Capabilities</span>
            <div class="tr-tiers">${tierBtns}</div>
          </div>
          <div class="tr-tier-note">Presets apply a role's default grants, then individual toggles override.</div>
          ${capRows}
        </div>`;
    }

    function renderTeam(data) {
      const el = document.getElementById('team-content');

      if (!data || data.configured === false) {
        el.innerHTML = '<div class="product-notice">Team runtime DB not yet connected — set ' +
          '<code>TEAM_SUPABASE_URL</code> and <code>TEAM_SUPABASE_SERVICE_ROLE_KEY</code> ' +
          'env vars in Vercel.</div>';
        return;
      }

      const rt = data.runtime || {};
      const global = data.global || { active: true, hard_paused: false, killed_reason: null };
      const agentsArr = data.agents || [];
      const tiers = data.tiers || [];

      // --- Runtime-alive light ---
      const aliveCls = rt.aliveFresh ? 'alive' : 'down';
      const aliveText = rt.aliveFresh ? 'Runtime alive' : 'Runtime down (or never booted)';
      const hbStr = rt.heartbeat_at ? ' · heartbeat ' + timeAgo(rt.heartbeat_at) : '';

      let html = `
        <div class="tr-runtime-light ${aliveCls}"><span class="dot"></span>${aliveText}${hbStr}</div>
        <div class="tr-note">Paused &ne; down — the heartbeat runs even while paused. Writes take effect on the runtime within ~5s (gate-cache TTL).</div>`;

      // --- Master card (the global switch) ---
      const gStatus = trStatus(global);
      const masterCls = gStatus === 'killed' ? 'killed' : (gStatus === 'active' ? '' : 'paused');
      html += `
        <div class="tr-card master ${masterCls}">
          <div class="tr-card-head">
            <span class="tr-title">All agents (global switch)</span>
            <span class="tr-statuslight ${gStatus}"><span class="dot"></span>${trStatusText(gStatus)}</span>
          </div>
          <div class="tr-controls">
            <button class="tr-btn pause" data-tr-act="pause" data-tr-target="all">Pause</button>
            <button class="tr-btn hard" data-tr-act="pause-hard" data-tr-target="all">Hard pause</button>
            <button class="tr-btn resume" data-tr-act="resume" data-tr-target="all">Resume</button>
            ${trKillBtn('kill-all', 'all', 'Kill all')}
            ${trKillBtn('kill-all-mains', 'all-mains', 'Kill all mains')}
          </div>
          ${trReasonBlock('all', global.killed_reason)}
        </div>`;

      // --- Per-agent cards ---
      html += '<div class="tr-section-label">Mains</div>';
      if (agentsArr.length === 0) {
        html += '<div class="tr-empty">No agent rows yet.</div>';
      } else {
        agentsArr.forEach(a => {
          const st = trStatus(a);
          const stClass = st === 'hardpaused' ? 'hardpaused' : st;
          const lw = a.last_wake
            ? `${formatDateTime(a.last_wake.created_at)} · ${escapeHtml(a.last_wake.reason || '')}` : 'never';
          html += `
            <div class="tr-card agent ${stClass}">
              <div class="tr-card-head">
                <span class="tr-title">${escapeHtml(a.agent)}</span>
                <span class="tr-statuslight ${stClass}"><span class="dot"></span>${trStatusText(st)}</span>
              </div>
              <div class="tr-meta">
                <span><span class="k">last wake:</span> ${lw}</span>
                <span><span class="k">in-flight:</span> ${a.in_flight || 0}</span>
                ${a.killed_reason ? `<span><span class="k">reason:</span> ${trReasonDisplay(a.killed_reason)}</span>` : ''}
              </div>
              <div class="tr-controls">
                <button class="tr-btn pause" data-tr-act="pause" data-tr-target="${escapeHtml(a.agent)}">Pause</button>
                <button class="tr-btn hard" data-tr-act="pause-hard" data-tr-target="${escapeHtml(a.agent)}">Hard pause</button>
                <button class="tr-btn resume" data-tr-act="resume" data-tr-target="${escapeHtml(a.agent)}">Resume</button>
                ${trKillBtn('kill-' + a.agent, a.agent, 'Kill')}
              </div>
              ${trReasonBlock(a.agent, a.killed_reason)}
              ${trCapsPanel(a, a.capabilities, tiers)}
            </div>`;
        });
      }

      // --- Workers placeholder ---
      html += '<div class="tr-section-label">Workers (by manager)</div>';
      html += '<div class="tr-empty">Worker tier lands Phase 4.</div>';

      el.innerHTML = html;
    }

    // A kill button that carries its are-you-sure state (two-step). confirmKey is
    // stable across re-renders so a pending confirm survives the 30s refresh.
    function trKillBtn(confirmKey, target, label) {
      const pending = teamConfirming.has(confirmKey);
      if (pending) {
        return `<button class="tr-btn confirm" data-tr-act="kill-confirm" data-tr-confirm-key="${escapeHtml(confirmKey)}" data-tr-target="${escapeHtml(target)}">Sure? ${escapeHtml(label)}</button>`;
      }
      return `<button class="tr-btn kill" data-tr-act="kill-arm" data-tr-confirm-key="${escapeHtml(confirmKey)}" data-tr-target="${escapeHtml(target)}">${escapeHtml(label)}</button>`;
    }

    async function loadTeamData() {
      if (!authHeader) return;
      try {
        const res = await fetch('/api/team', { headers: { 'Authorization': authHeader } });
        if (res.status === 401) {
          localStorage.removeItem('evryn_auth'); authHeader = null; showLogin(true); return;
        }
        if (!res.ok) throw new Error('Failed to fetch team runtime data');
        teamData = await res.json();
        renderTeam(teamData);
      } catch (err) {
        console.error('Team runtime error:', err);
        document.getElementById('team-content').innerHTML =
          '<div class="error">Failed to load team runtime</div>';
      }
    }

    // Delegated event handling for the whole team tab.
    document.getElementById('team-content').addEventListener('click', (e) => {
      const twirl = e.target.closest('[data-tr-twirl]');
      if (twirl) {
        const key = twirl.dataset.trTwirl;
        const desc = document.querySelector(`[data-tr-desc="${CSS.escape(key)}"]`);
        if (teamOpenCaps.has(key)) { teamOpenCaps.delete(key); twirl.classList.remove('open'); if (desc) desc.classList.remove('open'); }
        else { teamOpenCaps.add(key); twirl.classList.add('open'); if (desc) desc.classList.add('open'); }
        return;
      }

      const chip = e.target.closest('[data-tr-reason-chip]');
      if (chip) {
        const target = chip.dataset.trReasonChip;
        teamAction({ action: 'set_reason', target, reason: chip.dataset.trReasonText });
        return;
      }

      const tierBtn = e.target.closest('[data-tr-tier]');
      if (tierBtn) {
        teamAction({ action: 'apply_tier', agent: tierBtn.dataset.trTierAgent, tier: tierBtn.dataset.trTier });
        return;
      }

      const btn = e.target.closest('[data-tr-act]');
      if (!btn) return;
      const act = btn.dataset.trAct;
      const target = btn.dataset.trTarget;

      if (act === 'pause') { teamAction({ action: 'pause', target, hard: false }); }
      else if (act === 'pause-hard') { teamAction({ action: 'pause', target, hard: true }); }
      else if (act === 'resume') { teamAction({ action: 'resume', target }); }
      else if (act === 'kill-arm') {
        // First click: arm the confirm (re-render just this button set).
        teamConfirming.add(btn.dataset.trConfirmKey);
        renderTeam(teamData);
      } else if (act === 'kill-confirm') {
        teamConfirming.delete(btn.dataset.trConfirmKey);
        teamAction({ action: 'kill', target });
      }
    });

    // Reason free-text: commit on Enter or blur (fires set_reason).
    document.getElementById('team-content').addEventListener('keydown', (e) => {
      const input = e.target.closest('[data-tr-reason-input]');
      if (input && e.key === 'Enter') {
        teamAction({ action: 'set_reason', target: input.dataset.trReasonInput, reason: input.value });
      }
    });
    document.getElementById('team-content').addEventListener('change', (e) => {
      const cap = e.target.closest('[data-tr-cap]');
      if (cap) {
        teamAction({
          action: 'set_capability',
          agent: cap.dataset.trCapAgent,
          capability: cap.dataset.trCap,
          granted: cap.checked,
        });
      }
    });

    // Set up login handlers
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('login-btn').addEventListener('click', doLogin);
      document.getElementById('password-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') doLogin();
      });
      document.getElementById('toggle-pw').addEventListener('click', () => {
        const input = document.getElementById('password-input');
        const btn = document.getElementById('toggle-pw');
        if (input.type === 'password') {
          input.type = 'text';
          btn.textContent = 'Hide';
        } else {
          input.type = 'password';
          btn.textContent = 'Show';
        }
      });
    });

    // Initialize date range and load
    initDateRange();
    loadData();
    // Product/Evryn vitals load on their OWN track — independent of loadData — so an
    // Agents-endpoint (/api/data) failure can never block the Product tab. Different
    // database, different tab; they must not be coupled.
    loadProductData();
    // Team runtime loads on its own track too (a third, separate database).
    loadTeamData();

    // Auto-refresh every 30 seconds
    setInterval(loadData, 30000);
    setInterval(loadProductData, 30000);
    setInterval(loadTeamData, 30000);

    // ========== Usage Chart ==========
    const agentColors = {
      thea: '#22c55e', lucas: '#60a5fa', alex: '#a855f7', taylor: '#eab308',
      dana: '#f97316', jordan: '#ec4899', dominic: '#2dd4bf', nathan: '#f43f5e'
    };
    const agentKeys = Object.keys(agentColors);
    let chartMetric = 'cost';
    let chartMode = 'total';
    let chartSelectedAgents = new Set();
    let lastClickedAgent = null; // last agent toggled on — renders on top
    let usageData = []; // raw bucketed data from API
    let usageChart = null;
    let chartDataMin = null; // earliest timestamp in loaded data
    let chartDataMax = null; // latest timestamp in loaded data
    let activeZoomPreset = 'day'; // 'day', 'week', or null if manually adjusted

    const DAY_MS = 24 * 60 * 60 * 1000;
    const WEEK_MS = 7 * DAY_MS;

    // Get "now" in Pacific time as a Date
    function nowPacific() {
      return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
    }

    // Format a Date to datetime-local input value (YYYY-MM-DDTHH:MM)
    function toLocalInput(d) {
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function initChart() {
      const ctx = document.getElementById('usage-chart').getContext('2d');
      usageChart = new Chart(ctx, {
        type: 'line',
        data: { datasets: [] },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 200 },
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: {
              type: 'time',
              time: {
                tooltipFormat: 'EEE MMM d, h:mm a',
                displayFormats: {
                  minute: 'h:mm a',
                  hour: 'h a',
                  day: 'EEE MMM d',
                },
              },
              ticks: {
                color: '#666',
                maxTicksLimit: 12,
                autoSkip: true,
              },
              grid: { color: '#222' },
            },
            y: {
              ticks: { color: '#666' },
              grid: { color: '#222' },
              beginAtZero: true,
            }
          },
          plugins: {
            legend: { display: true, labels: { color: '#888', boxWidth: 12 } },
            zoom: {
              pan: {
                enabled: true,
                mode: 'x',
                onPanComplete: () => onChartViewChanged(),
              },
              zoom: {
                wheel: {
                  enabled: true,
                  modifierKey: null,
                },
                mode: 'x',
                onZoomComplete: () => onChartViewChanged(),
              },
            },
          },
        },
      });
    }

    // Called after zoom/pan from plugin — sync UI
    function onChartViewChanged() {
      activeZoomPreset = null;
      updateZoomButtons();
      const { min, max } = getChartVisibleRange();
      updateTimeUnit(min, max);
      syncDatetimeInputsFromChart();
      updateRangeSlider();
    }

    function getChartVisibleRange() {
      const scale = usageChart.scales.x;
      return { min: scale.min, max: scale.max };
    }

    function updateTimeUnit(min, max) {
      const span = max - min;
      if (span <= DAY_MS * 1.5) {
        usageChart.options.scales.x.time.unit = 'hour';
      } else if (span <= WEEK_MS * 1.5) {
        usageChart.options.scales.x.time.unit = 'day';
      } else {
        usageChart.options.scales.x.time.unit = 'day';
      }
    }

    function setChartVisibleRange(min, max, noAnimation) {
      usageChart.options.scales.x.min = min;
      usageChart.options.scales.x.max = max;
      updateTimeUnit(min, max);
      usageChart.update(noAnimation ? 'none' : undefined);
      syncDatetimeInputsFromChart();
      updateRangeSlider();
    }

    function syncDatetimeInputsFromChart() {
      const { min, max } = getChartVisibleRange();
      document.getElementById('chart-from').value = toLocalInput(new Date(min));
      document.getElementById('chart-to').value = toLocalInput(new Date(max));
      // Sync activity table date range
      syncActivityDateRange();
    }

    function updateZoomButtons() {
      document.querySelectorAll('[data-zoom]').forEach(b => {
        if (b.dataset.zoom === 'now') return; // Now is never "active" state
        b.classList.toggle('active', b.dataset.zoom === activeZoomPreset);
      });
    }

    function applyZoomPreset(preset) {
      const now = nowPacific().getTime();
      let min, max;
      if (preset === 'day') {
        max = now + DAY_MS * 0.02; // small padding right
        min = max - DAY_MS;
      } else if (preset === 'week') {
        max = now + DAY_MS * 0.1;
        min = max - WEEK_MS;
      }
      activeZoomPreset = preset;
      updateZoomButtons();
      usageChart.resetZoom();
      setChartVisibleRange(min, max);
    }

    function jumpToNow() {
      const { min, max } = getChartVisibleRange();
      const span = max - min;
      const now = nowPacific().getTime();
      const newMax = now + span * 0.02;
      const newMin = newMax - span;
      setChartVisibleRange(newMin, newMax);
    }

    function buildChartDatasets() {
      const datasets = [];
      const metric = chartMetric;

      if (chartMode === 'total') {
        datasets.push({
          label: 'Total',
          data: usageData.map(d => {
            let sum = 0;
            Object.values(d.agents).forEach(a => { sum += a[metric]; });
            return { x: new Date(d.bucket).getTime(), y: metric === 'cost' ? parseFloat(sum.toFixed(4)) : sum };
          }),
          borderColor: '#60a5fa',
          backgroundColor: 'rgba(96,165,250,0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 2,
        });
      } else {
        // Put lastClickedAgent last so it renders on top
        const showAgents = [...chartSelectedAgents].sort((a, b) => {
          if (a === lastClickedAgent) return 1;
          if (b === lastClickedAgent) return -1;
          return 0;
        });
        showAgents.forEach(agent => {
          datasets.push({
            label: agent.charAt(0).toUpperCase() + agent.slice(1),
            data: usageData.map(d => {
              const a = d.agents[agent];
              const val = a ? a[metric] : 0;
              return { x: new Date(d.bucket).getTime(), y: metric === 'cost' ? parseFloat(val.toFixed(4)) : val };
            }),
            borderColor: agentColors[agent],
            backgroundColor: 'transparent',
            tension: 0.3,
            pointRadius: 2,
          });
        });
      }
      return datasets;
    }

    function renderChart() {
      if (!usageChart) return;
      const { min, max } = usageChart.scales.x ? getChartVisibleRange() : { min: null, max: null };
      usageChart.data.datasets = buildChartDatasets();
      usageChart.options.scales.y.title = { display: true, text: chartMetric === 'cost' ? 'USD' : 'Tokens', color: '#666' };
      // Preserve current view if we have one
      if (min && max) {
        usageChart.options.scales.x.min = min;
        usageChart.options.scales.x.max = max;
      }
      usageChart.update('none');
      syncDatetimeInputsFromChart();
      updateRangeSlider();
    }

    async function loadUsageData() {
      if (!authHeader) return;
      try {
        // Always fetch last 30 days of minute-level data for smooth zooming
        const now = nowPacific();
        const from = new Date(now.getTime() - 30 * DAY_MS);
        const fromStr = from.toISOString();
        const toStr = new Date(now.getTime() + DAY_MS).toISOString();
        const res = await fetch(`/api/usage?granularity=minute&from=${fromStr}&to=${toStr}`, {
          headers: { 'Authorization': authHeader }
        });
        if (!res.ok) return;
        const json = await res.json();
        usageData = json.data || [];
        if (usageData.length > 0) {
          chartDataMin = new Date(usageData[0].bucket).getTime();
          chartDataMax = new Date(usageData[usageData.length - 1].bucket).getTime();
        } else {
          chartDataMin = from.getTime();
          chartDataMax = now.getTime();
        }
        // Build datasets and apply current zoom
        usageChart.data.datasets = buildChartDatasets();
        usageChart.options.scales.y.title = { display: true, text: chartMetric === 'cost' ? 'USD' : 'Tokens', color: '#666' };
        if (activeZoomPreset) {
          applyZoomPreset(activeZoomPreset);
        } else {
          usageChart.update('none');
          syncDatetimeInputsFromChart();
          updateRangeSlider();
        }
      } catch (e) {
        console.error('Usage chart error:', e);
      }
    }

    // ========== Horizontal scroll to pan ==========
    document.getElementById('usage-chart').addEventListener('wheel', (e) => {
      // Handle horizontal scroll (wheel tilt / trackpad horizontal swipe)
      if (Math.abs(e.deltaX) > Math.abs(e.deltaY) && e.deltaX !== 0) {
        e.preventDefault();
        const { min, max } = getChartVisibleRange();
        const span = max - min;
        const panAmount = span * 0.05 * Math.sign(e.deltaX);
        setChartVisibleRange(min + panAmount, max + panAmount, true);
        activeZoomPreset = null;
        updateZoomButtons();
      }
      // Shift+wheel vertical also pans
      if (e.shiftKey && Math.abs(e.deltaY) > 0) {
        e.preventDefault();
        const { min, max } = getChartVisibleRange();
        const span = max - min;
        const panAmount = span * 0.05 * Math.sign(e.deltaY);
        setChartVisibleRange(min + panAmount, max + panAmount, true);
        activeZoomPreset = null;
        updateZoomButtons();
      }
    }, { passive: false });

    // ========== Range Slider ==========
    const rangeSlider = document.getElementById('range-slider');
    const rangeSelected = document.getElementById('range-selected');
    let sliderDragging = null; // 'left', 'right', 'middle'
    let sliderDragStartX = 0;
    let sliderDragStartLeft = 0;
    let sliderDragStartRight = 0;
    let sliderDragStartWidth = 0;

    function getSliderWidth() { return rangeSlider.getBoundingClientRect().width; }

    function timeToSliderPct(t) {
      if (!chartDataMin || !chartDataMax || chartDataMax === chartDataMin) return 0;
      // Use a 30-day window for the slider
      const now = nowPacific().getTime();
      const sliderMin = now - 30 * DAY_MS;
      const sliderMax = now + DAY_MS;
      return Math.max(0, Math.min(1, (t - sliderMin) / (sliderMax - sliderMin)));
    }

    function sliderPctToTime(pct) {
      const now = nowPacific().getTime();
      const sliderMin = now - 30 * DAY_MS;
      const sliderMax = now + DAY_MS;
      return sliderMin + pct * (sliderMax - sliderMin);
    }

    function updateRangeSlider() {
      if (!usageChart || !usageChart.scales.x) return;
      const { min, max } = getChartVisibleRange();
      const leftPct = timeToSliderPct(min) * 100;
      const rightPct = timeToSliderPct(max) * 100;
      rangeSelected.style.left = leftPct + '%';
      rangeSelected.style.width = Math.max(0.5, rightPct - leftPct) + '%';
    }

    function onSliderMouseDown(e) {
      e.preventDefault();
      const target = e.target;
      const rect = rangeSlider.getBoundingClientRect();
      sliderDragStartX = e.clientX;

      sliderDragStartLeft = parseFloat(rangeSelected.style.left) || 0;
      sliderDragStartWidth = parseFloat(rangeSelected.style.width) || 10;
      sliderDragStartRight = sliderDragStartLeft + sliderDragStartWidth;

      if (target.id === 'range-handle-left') {
        sliderDragging = 'left';
      } else if (target.id === 'range-handle-right') {
        sliderDragging = 'right';
      } else if (target.id === 'range-selected') {
        sliderDragging = 'middle';
      } else {
        // Click on track — jump the window center there
        const clickPct = ((e.clientX - rect.left) / rect.width) * 100;
        const widthPct = parseFloat(rangeSelected.style.width) || 10;
        let newLeft = clickPct - widthPct / 2;
        newLeft = Math.max(0, Math.min(100 - widthPct, newLeft));
        const newMin = sliderPctToTime(newLeft / 100);
        const newMax = sliderPctToTime((newLeft + widthPct) / 100);
        activeZoomPreset = null;
        updateZoomButtons();
        setChartVisibleRange(newMin, newMax);
        return;
      }
      document.addEventListener('mousemove', onSliderMouseMove);
      document.addEventListener('mouseup', onSliderMouseUp);
    }

    function onSliderMouseMove(e) {
      if (!sliderDragging) return;
      const rect = rangeSlider.getBoundingClientRect();
      const dx = ((e.clientX - sliderDragStartX) / rect.width) * 100;

      if (sliderDragging === 'left') {
        // Move left edge, right edge stays fixed at sliderDragStartRight
        let newLeft = Math.max(0, Math.min(sliderDragStartRight - 1, sliderDragStartLeft + dx));
        let newWidth = sliderDragStartRight - newLeft;
        rangeSelected.style.left = newLeft + '%';
        rangeSelected.style.width = newWidth + '%';
        const newMin = sliderPctToTime(newLeft / 100);
        const fixedMax = sliderPctToTime(sliderDragStartRight / 100);
        usageChart.options.scales.x.min = newMin;
        usageChart.options.scales.x.max = fixedMax;
        usageChart.update('none');
        syncDatetimeInputsFromChart();
      } else if (sliderDragging === 'right') {
        // Move right edge, left edge stays fixed at sliderDragStartLeft
        let newRight = Math.min(100, Math.max(sliderDragStartLeft + 1, sliderDragStartRight + dx));
        let newWidth = newRight - sliderDragStartLeft;
        rangeSelected.style.width = newWidth + '%';
        const fixedMin = sliderPctToTime(sliderDragStartLeft / 100);
        const newMax = sliderPctToTime(newRight / 100);
        usageChart.options.scales.x.min = fixedMin;
        usageChart.options.scales.x.max = newMax;
        usageChart.update('none');
        syncDatetimeInputsFromChart();
      } else if (sliderDragging === 'middle') {
        let newLeft = Math.max(0, Math.min(100 - sliderDragStartWidth, sliderDragStartLeft + dx));
        rangeSelected.style.left = newLeft + '%';
        const newMin = sliderPctToTime(newLeft / 100);
        const newMax = sliderPctToTime((newLeft + sliderDragStartWidth) / 100);
        usageChart.options.scales.x.min = newMin;
        usageChart.options.scales.x.max = newMax;
        usageChart.update('none');
        syncDatetimeInputsFromChart();
      }
      activeZoomPreset = null;
      updateZoomButtons();
    }

    function onSliderMouseUp() {
      sliderDragging = null;
      document.removeEventListener('mousemove', onSliderMouseMove);
      document.removeEventListener('mouseup', onSliderMouseUp);
    }

    rangeSlider.addEventListener('mousedown', onSliderMouseDown);

    // ========== Chart Controls ==========
    document.getElementById('chart-controls').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;

      const metric = btn.dataset.metric;
      const zoom = btn.dataset.zoom;
      const action = btn.dataset.chartAction;
      const agent = btn.dataset.chartAgent;

      if (metric) {
        chartMetric = metric;
        document.querySelectorAll('[data-metric]').forEach(b => b.classList.toggle('active', b.dataset.metric === metric));
        renderChart();
      } else if (zoom === 'day' || zoom === 'week') {
        applyZoomPreset(zoom);
      } else if (zoom === 'now') {
        jumpToNow();
      } else if (action === 'total') {
        chartMode = 'total';
        chartSelectedAgents.clear();
        document.querySelectorAll('[data-chart-action]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('[data-chart-agent]').forEach(b => b.classList.remove('active'));
        renderChart();
      } else if (action === 'all') {
        chartMode = 'individual';
        lastClickedAgent = null;
        agentKeys.forEach(a => chartSelectedAgents.add(a));
        document.querySelectorAll('[data-chart-action]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('[data-chart-agent]').forEach(b => b.classList.add('active'));
        renderChart();
      } else if (action === 'none') {
        chartMode = 'individual';
        chartSelectedAgents.clear();
        document.querySelectorAll('[data-chart-action]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('[data-chart-agent]').forEach(b => b.classList.remove('active'));
        renderChart();
      } else if (agent) {
        chartMode = 'individual';
        if (chartSelectedAgents.has(agent)) {
          chartSelectedAgents.delete(agent);
          btn.classList.remove('active');
          if (lastClickedAgent === agent) lastClickedAgent = null;
        } else {
          chartSelectedAgents.add(agent);
          btn.classList.add('active');
          lastClickedAgent = agent;
        }
        document.querySelectorAll('[data-chart-action]').forEach(b => b.classList.remove('active'));
        if (chartSelectedAgents.size === agentKeys.length) {
          document.querySelector('[data-chart-action="all"]').classList.add('active');
        } else if (chartSelectedAgents.size === 0) {
          document.querySelector('[data-chart-action="none"]').classList.add('active');
        }
        renderChart();
      }
    });

    // Datetime picker changes → update chart view
    document.getElementById('chart-from').addEventListener('change', (e) => {
      const min = new Date(e.target.value).getTime();
      const { max } = getChartVisibleRange();
      if (min < max) {
        activeZoomPreset = null;
        updateZoomButtons();
        setChartVisibleRange(min, max);
      }
    });
    document.getElementById('chart-to').addEventListener('change', (e) => {
      const max = new Date(e.target.value).getTime();
      const { min } = getChartVisibleRange();
      if (max > min) {
        activeZoomPreset = null;
        updateZoomButtons();
        setChartVisibleRange(min, max);
      }
    });

    // Initialize chart and load data
    initChart();
    loadUsageData();

  </script>
</body>
</html>
